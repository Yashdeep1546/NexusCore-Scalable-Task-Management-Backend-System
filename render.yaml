services:
  # Backend Web Service (Express)
  - type: web
    name: nexuscore-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexuscore-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # Frontend Static Site (React)
  - type: web
    name: nexuscore-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: nexuscore-backend
          property: host

databases:
  - name: nexuscore-db
    plan: free
    databaseName: nexuscore
    user: nexus_admin
