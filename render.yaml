services:
# Backend Web Service
- type: web
  name: nexuscore-backend
    env: node
      plan: free
        rootDir: backend
          buildCommand: npm install && npx prisma generate
            startCommand: node server.js
              envVars:
                  - key: DATABASE_URL
                        fromDatabase:
                                name: nexuscore-db
                                        property: connectionString
                                            - key: JWT_SECRET
                                                  generateValue: true
                                                      - key: NODE_ENV
                                                            value: production

                                                            # Frontend Static Site
                                                            - type: web
                                                              name: nexuscore-frontend
                                                                runtime: static
                                                                  plan: free
                                                                    rootDir: frontend
                                                                      buildCommand: npm install && npm run build
                                                                        staticPublishPath: dist
                                                                          envVars:
                                                                              - key: VITE_API_URL
                                                                                    fromService:
                                                                                            type: web
                                                                                                    name: nexuscore-backend
                                                                                                            property: host
                                                                                                            
                                                                                                            databases:
                                                                                                            - name: nexuscore-db
                                                                                                              plan: free
